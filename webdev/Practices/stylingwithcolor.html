<!DOCTYPE html>
<html lang="en">
    <head>
        <title>CSS Styling with Color</title>
        <meta charset="UTF-8">
        <style>
            h1{
                background-color: bisque;
                text-align: center;
                border: 2px solid rgb(160, 127, 108);
                
            }
            .complementary{
                height: 200px;
                width: 200px;
                background-color: rgb(90, 105, 74);
                border: 5px solid red;
                color:rgb(61, 27, 27);
                text-align: center;
                font-family: Verdana, sans-serif;
            }
            .analogous{
                height: 200px;
                width: 200px;
                background-color: rgb(74, 84, 105);
                border: 5px solid rgb(88, 27, 88);
                color: rgb(51, 14, 53);
                text-align: center;
                font-family: Verdana, sans-serif;
            }
            .triadic{
                height: 200px;
                width: 200px;
                background-color: rgb(116, 46, 46);
                border: 5px solid rgb(58, 58, 82);
                color: rgb(172, 150, 28);
                text-align: center;
                font-family: Verdana, sans-serif;
            }
        </style>
    </head>
    <body>
        <h1>CSS Styling with Color</h1>
        <div class=complementary>
            <h3>Div 1 - Complementary</h3>
        </div>
        <br>
        <div class="analogous">
            <h3>Div 2 - Analogous</h3>
        </div>
        <br>
        <div class="triadic">
            <h3>Div 3 - Triadic</h3>
        </div>

    </body>
</html>
